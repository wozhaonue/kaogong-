<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>色板实验室</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07131c;
        --panel: rgba(13, 27, 39, 0.82);
        --line: rgba(146, 220, 233, 0.18);
        --ink: #edf7fa;
        --muted: rgba(221, 235, 239, 0.72);
        --accent: #8fe7f1;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top, rgba(143, 231, 241, 0.16), transparent 34%),
          linear-gradient(180deg, #0d1d2b 0%, var(--bg) 100%);
      }
      .card {
        width: min(760px, 100%);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(14px);
      }
      h1 {
        margin: 0;
        font-family: "Noto Serif SC", "Source Han Serif SC", serif;
        font-size: 40px;
      }
      p { color: var(--muted); line-height: 1.8; }
      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>色板实验室</h1>
      <p>这是一个示例子工具页，用于证明门户首页中的工具卡片可以链接到任意纯前端 HTML 页面。</p>
      <p>后续你可以把这里替换成实际的配色、组件演示或图形实验工具。</p>
      <p><a href="../../index.html">返回工具首页</a></p>
    </main>
  </body>
</html>
